<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Selamod Guest House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="adminApp">
        <div class="admin-header">
            <div class="admin-logo">
                <div class="logo-dot">
                    <div class="logo-dot-inner"></div>
                </div>
                SELAMOD ADMIN
            </div>
            <div class="admin-user">
                <span class="admin-email" id="adminEmailDisplay">admin@admin.com</span>
                <button class="logout-btn" id="adminLogoutBtn">LOGOUT</button>
            </div>
        </div>

        <div class="admin-tabs">
            <button class="tab-btn active" data-tab="bookings">Bookings</button>
            <button class="tab-btn" data-tab="users">Registered Users</button>
            <button class="tab-btn" data-tab="settings">Admin Settings</button>
        </div>

        <!-- Bookings Panel -->
        <div id="tab-bookings" class="tab-panel active">
            <div class="stats-row">
                <div class="stat-card">
                    <h4>Total Bookings</h4>
                    <div class="stat-number" id="totalBookings">0</div>
                </div>
                <div class="stat-card">
                    <h4>Total Revenue (ZAR)</h4>
                    <div class="stat-number" id="totalRevenue">0</div>
                </div>
            </div>
            <div class="table-container">
                <table id="bookingsTable">
                    <thead>
                        <tr>
                            <th>Guest Name</th>
                            <th>Room</th>
                            <th>Check-In</th>
                            <th>Check-Out</th>
                            <th>Total (ZAR)</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                        <tr>
                            <td colspan="5" class="empty-state">Loading bookings...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Users Panel -->
        <div id="tab-users" class="tab-panel">
            <div class="stats-row">
                <div class="stat-card">
                    <h4>Total Users</h4>
                    <div class="stat-number" id="totalUsers">0</div>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="3" class="empty-state">Loading users...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Admin Settings Panel -->
        <div id="tab-settings" class="tab-panel">
            <div class="settings-card">
                <h3 style="margin-bottom: 1.5rem; font-family: 'Playfair Display', serif;">Update Admin Credentials</h3>
                <div id="settingsAlert"></div>
                <form id="adminSettingsForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="adminEmail" required placeholder="admin@example.com">
                    </div>
                    <div class="form-group">
                        <label>New Password (leave blank to keep current)</label>
                        <input type="password" id="adminPassword" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="adminConfirmPassword" placeholder="confirm">
                    </div>
                    <button type="submit" class="btn-save">Update Credentials</button>
                </form>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
